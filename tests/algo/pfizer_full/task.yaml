description: >
  Real-world Pfizer clinical study pipeline. Past pipeline operated on a star
  schema with 4 source tables (dsopi_st_cln_study_operational, srt_study,
  cv_study_data, dsopi_st_cln_study_portfolio) joined via INNER JOINs, with
  complex COALESCE logic to merge overlapping columns from dsopi and srt sources.
  Current sources consolidate everything into 2 tables (operational_metrics +
  trial_master) with a single LEFT JOIN. The algorithm must collapse 3 INNER JOINs,
  eliminate COALESCE merge logic (pre-merged in current source), adapt boolean-to-Y/N
  CASE expressions, and map ~40 renamed columns.

sources:
  - name: operational_metrics
    file: sourcedata/operational_metrics.csv
    schema:
      - { name: STUDY_NUMBER, type: VARCHAR }
      - { name: CRITICAL_PATH_IND, type: VARCHAR }
      - { name: CONTACT_PROVIDER, type: VARCHAR }
      - { name: CPOC_PERCENT_COMPLETE, type: DOUBLE }
      - { name: IQMP_FULL_FLAG, type: VARCHAR }
      - { name: GLOBAL_PLACEMENT, type: VARCHAR }
      - { name: MONITOR_INTERVAL_MAX, type: BIGINT }
      - { name: PIMS_INDICATOR, type: VARCHAR }
      - { name: RAP_RCPMS_IND, type: VARCHAR }
      - { name: RCPMS_INDICATOR, type: VARCHAR }
      - { name: RECRUITMENT_COUNTRY_LIST, type: VARCHAR }
      - { name: RECRUITMENT_DESIGN, type: VARCHAR }
      - { name: RECRUITMENT_VERSION, type: VARCHAR }
      - { name: RECRUITMENT_APPROACH, type: VARCHAR }
      - { name: RECRUITMENT_BEGIN_DATE, type: DATE }
      - { name: RFSSMI_INDICATOR, type: VARCHAR }
      - { name: TMF_REQUIRED, type: VARCHAR }
      - { name: ADJUDICATION_COMMITTEE, type: VARCHAR }
      - { name: DMC_FLAG, type: VARCHAR }
      - { name: APPROVED_PRODUCT_EU, type: BOOLEAN }
      - { name: IB_REVISION_DATE, type: TIMESTAMP }
      - { name: PAPER_CRF_USED, type: BOOLEAN }
      - { name: EDC_SYSTEM, type: VARCHAR }
      - { name: SUBJECT_TYPE, type: VARCHAR }
      - { name: COMPLETION_TARGET, type: BIGINT }
      - { name: ENROLLMENT_TARGET, type: BIGINT }
      - { name: DATA_COLLECTION_PRIMARY, type: VARCHAR }
      - { name: DATA_COLLECTION_SECONDARY, type: VARCHAR }
      - { name: DATA_RETURN_COMPLETE, type: VARCHAR }
      - { name: DATA_WITHHELD_FLAG, type: VARCHAR }
      - { name: PARTICIPANT_RETURN_ELIGIBLE, type: VARCHAR }
      - { name: STUDY_RATIONALE, type: VARCHAR }
      - { name: MEDICAL_OWNER, type: VARCHAR }
      - { name: PROJECT_TYPE, type: VARCHAR }
      - { name: SAP_END, type: TIMESTAMP }
      - { name: SAP_COMPLETION_PCT, type: BIGINT }
      - { name: SAP_START, type: TIMESTAMP }
      - { name: CLINICAL_PM, type: VARCHAR }
      - { name: EXECUTION_STATUS, type: VARCHAR }
      - { name: PERFORMING_SITE, type: VARCHAR }
      - { name: PROJECT_NAME, type: VARCHAR }
      - { name: PROJECT_TEMPLATE, type: VARCHAR }
      - { name: PLAN_STATUS, type: VARCHAR }
      - { name: PORTFOLIO_GROUP, type: VARCHAR }
      - { name: CLINICAL_PLACEMENT, type: VARCHAR }
      - { name: CREATE_TIMESTAMP, type: TIMESTAMP }
      - { name: UPDATE_TIMESTAMP, type: TIMESTAMP }
      - { name: LAST_MODIFIED, type: TIMESTAMP }
  - name: trial_master
    file: sourcedata/trial_master.csv
    schema:
      - { name: TRIAL_NUMBER, type: VARCHAR }
      - { name: TRIAL_TITLE, type: VARCHAR }
      - { name: SPONSOR, type: VARCHAR }

